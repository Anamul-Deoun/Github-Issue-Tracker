<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- tailwind + daisyUI link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Github Issues Tracker</title>
    <style>
        body { font-family: 'Geist', sans-serif; }
    </style>
</head>

<body class="bg-[#F8FAFC]">
    <nav class="sticky top-0 z-50">
        <div class="navbar bg-base-100 shadow-sm px-4 md:px-20 flex flex-col md:flex-row gap-4 py-4 md:py-2 justify-between">
            <div class="flex items-center gap-2">
                <img class="w-8 h-8" src="./assets/github-logo.png" alt="logo">
                <a class="text-lg md:text-xl font-bold">Github Issues Tracker</a>
            </div>
            <div class="flex w-full md:w-auto gap-2">
                <input id="search-input" onkeyup="searchIssues()" type="text" placeholder="Search Issues"
                    class="input input-bordered grow md:w-auto" />
                <button class="btn btn-primary"><i class="fa fa-plus"></i> <span class="hidden md:inline">New Issues</span></button>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-6xl mx-auto px-4 py-8 md:py-15">

        <section class="mb-6">
            <div class="bg-white p-4 md:p-6 rounded-lg flex flex-wrap md:flex-nowrap gap-2 shadow">
                <button onclick="filterIssues('all')" class="btn grow md:w-28 btn-primary" id="btn-all">All</button>
                <button onclick="filterIssues('open')" class="btn grow md:w-28" id="btn-open">Open</button>
                <button onclick="filterIssues('closed')" class="btn grow md:w-28" id="btn-closed">Closed</button>
            </div>
        </section>

        <section class="bg-white rounded-lg shadow overflow-hidden">
            <div class="p-4 md:p-6 flex flex-col md:flex-row justify-between border-b-2 border-b-[#FBFBFB] gap-4">
                <div class="flex items-center gap-3">
                    <img src="./assets/Aperture.png" alt="icon" class="w-10 h-10">
                    <div>
                        <div class="flex items-baseline gap-1">
                            <span id="issue-count" class="text-xl md:text-2xl font-bold text-slate-800">0</span>
                            <span class="text-xl md:text-2xl font-bold text-slate-800">Issues</span>
                        </div>
                        <p class="text-sm text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="flex items-center gap-6 text-sm">
                    <div class="flex items-center gap-2">
                        <img src="./assets/Open-Status.png" class="w-5 h-5" alt="">
                        <p class="font-medium">Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <img src="./assets/Closed-Status.png" class="w-5 h-5" alt="">
                        <p class="font-medium">Closed</p>
                    </div>
                </div>
            </div>

            <div id="card-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 p-4 md:p-6">
                </div>
        </section>

        <dialog id="issue_modal" class="modal">
            <div class="modal-box w-11/12 max-w-4xl p-6 md:p-10 relative border-2 border-blue-400">
                <div id="modal-content">
                    </div>
                <div class="modal-action">
                    <form method="dialog">
                        <button class="btn bg-indigo-600 text-white px-8">Close</button>
                    </form>
                </div>
            </div>
            <form method="dialog" class="modal-backdrop">
                <button>close</button>
            </form>
        </dialog>
    </main>

    <script src="./JS/script.js"></script>
</body>

</html>

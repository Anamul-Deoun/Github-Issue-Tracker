<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome cdn link -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind + daisyUI link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- tailwind.init.css link -->
    <link rel="stylesheet" href="tailwind.init.css">
    <title>Github Issues Tracker</title>

</head>

<body class="bg-[#F8FAFC]">
    <nav>
        <div class="navbar bg-base-100 shadow-sm px-20 flex justify-between">
            <div class="flex">
                <img class="w-9 h-full" src="./assets/github-logo.png" alt="">
                <a class="btn btn-ghost text-xl">Github Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search Issues" class="input input-bordered w-24 md:w-auto" />
                <button class="btn btn-primary"><i class="fa fa-plus" aria-hidden="true"></i> New Issues</button>
            </div>
        </div>
    </nav>

    <main class="w-6xl mx-auto py-15">
        <section>
            <div class="bg-white p-6 rounded-lg mb-4 flex gap-2 shadow">
                <button class="btn w-28 btn-primary">All</button>
                <button class="btn w-28 ">Open</button>
                <button class="btn w-28 ">Closed</button>
            </div>
        </section>

        <section>
            <div class="bg-white p-6 flex justify-between rounded-t-lg border-b-2 border-b-[#FBFBFB] shadow">
                <div class="flex items-center gap-2">
                    <img src="./assets/Aperture.png" alt="">
                    <div>
                        <h3 class="text-xl font-semibold">50 Issues</h3>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <img src="./assets/Open-Status.png" alt="">
                        <p class="font-medium">Open</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <img src="./assets/Closed- Status .png" alt="">
                        <p class="font-medium">Closed</p>
                    </div>
                </div>
            </div>

            <div class="card-item bg-[#FBFBFB] shadow p-6 grid grid-cols-4">
                <div class="card bg-white p-4">
                    <div class="flex justify-between items-center">
                        <img src="./assets/Open-Status.png" alt="">
                        <button
                            class="text-[12px] p-1 font-semibold text-red-500 bg-red-200 w-20 rounded-full">HIGH</button>
                    </div>
                    <div class="border-b-2 border-b-[#FBFBFB] mt-3">
                        <h3 class="text-sm font-semibold">Fix Navigation Menu On Mobile Devices</h3>
                        <p class="text-[12px] text-[#64748B]">The navigation menu doesn't collapes properly on</p>
                        <div class="my-3">
                            <button
                                class="text-[12px] p-2 font-semibold text-red-500 bg-red-200  rounded-full">BUG</button>
                            <button class="text-[12px] p-2 font-semibold text-red-500 bg-red-200  rounded-full">HELP
                                WANTED</button>
                        </div>
                    </div>
                    <p class="text-[#64748B] text-[12px] pt-4">#1 by john_doe</p>
                    <p class="text-[#64748B] text-[12px]">1/15/2024</p>
                </div>
            </div>
        </section>
    </main>

    <!-- Script file link -->
    <script src="./JS/script.js"></script>
</body>

</html>
